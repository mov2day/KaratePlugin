<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Karate belt with "K" symbol -->
  <g id="karate-icon">
    <!-- Belt background -->
    <rect x="20" y="50" width="88" height="28" rx="4" fill="#FF6B35"/>
    
    <!-- Belt knot -->
    <path d="M64 78 L54 88 L64 98 L74 88 Z" fill="#E85D2E"/>
    <path d="M64 78 L64 98" stroke="#C44E26" stroke-width="2"/>
    
    <!-- "K" letter -->
    <g transform="translate(64, 64)">
      <!-- Vertical line of K -->
      <rect x="-3" y="-20" width="6" height="40" rx="2" fill="white"/>
      
      <!-- Upper diagonal of K -->
      <path d="M 3 -8 L 18 -20 L 22 -16 L 7 -4 Z" fill="white"/>
      
      <!-- Lower diagonal of K -->
      <path d="M 3 8 L 18 20 L 22 16 L 7 4 Z" fill="white"/>
    </g>
    
    <!-- Decorative stitching -->
    <line x1="25" y1="54" x2="103" y2="54" stroke="#C44E26" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <line x1="25" y1="74" x2="103" y2="74" stroke="#C44E26" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  </g>
</svg>
